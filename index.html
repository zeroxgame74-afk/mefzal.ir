<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>mefzal.ir | پلتفرم موسیقی آنلاین</title>
    <!-- Font Awesome 6 (آیکون‌های حرفه‌ای) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- گوگل فونت وزیر (فونت فارسی زیبا) -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(145deg, #1e3a2f 0%, #0d2a21 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* تم پسته‌ای اصلی (Pistachio / Sage Green) */
        :root {
            --pistachio-light: #d4e6d0;
            --pistachio-soft: #b8d9aa;
            --pistachio-mid: #93c47d;
            --pistachio-deep: #6b8c5c;
            --pistachio-dark: #3b5c2f;
            --cream: #fef9e6;
            --shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35);
        }

        .glass-card {
            background: rgba(255, 248, 235, 0.92);
            backdrop-filter: blur(3px);
            border-radius: 2.5rem;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .main-container {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }

        /* هدر و هیرو */
        .hero-section {
            background: linear-gradient(135deg, var(--pistachio-deep), var(--pistachio-dark));
            border-radius: 2rem 2rem 2rem 2rem;
            padding: 1.8rem 2rem;
            margin-bottom: 2rem;
            color: white;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .logo-area h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to left, #f9f3c1, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-area p {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .domain-badge {
            background: rgba(255,245,215,0.2);
            backdrop-filter: blur(4px);
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            font-weight: 500;
            font-size: 1rem;
            border: 1px solid rgba(255,250,210,0.6);
        }

        .domain-badge i {
            margin-left: 8px;
        }

        /* پلیر اصلی بزرگ */
        .featured-player {
            background: #ffffffea;
            border-radius: 2rem;
            padding: 1.8rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }

        .cover-area {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            align-items: center;
            justify-content: center;
        }

        .artwork {
            background: linear-gradient(145deg, var(--pistachio-soft), var(--pistachio-mid));
            border-radius: 1.8rem;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
            transition: 0.2s;
        }

        .artwork i {
            font-size: 5rem;
            color: #2d4a22;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.2));
        }

        .track-info {
            flex: 1;
            min-width: 200px;
        }

        .track-info h2 {
            font-size: 1.9rem;
            color: #2f4d2d;
            font-weight: 800;
        }

        .track-info p {
            color: #5a6e52;
            margin: 8px 0;
        }

        .player-controls {
            background: #f3f7ef;
            padding: 1.2rem;
            border-radius: 3rem;
            margin-top: 1.5rem;
        }

        .controls-buttons {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1.2rem;
        }

        .controls-buttons button {
            background: var(--pistachio-deep);
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 60px;
            color: white;
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        .controls-buttons button:hover {
            background: var(--pistachio-dark);
            transform: scale(1.05);
        }

        .progress-area {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .progress-container {
            flex: 1;
            background: #d0dec8;
            border-radius: 20px;
            height: 6px;
            cursor: pointer;
        }

        .progress-bar {
            background: var(--pistachio-mid);
            width: 0%;
            height: 6px;
            border-radius: 20px;
            position: relative;
        }

        .time {
            font-size: 0.8rem;
            font-weight: 500;
            color: #4b6042;
        }

        /* لیست پلی لیست */
        .playlist-section {
            background: rgba(255, 252, 240, 0.96);
            border-radius: 2rem;
            padding: 1.5rem;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2c5a2a;
            border-right: 6px solid var(--pistachio-mid);
            padding-right: 1rem;
            margin-bottom: 1.5rem;
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }

        .track-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffffd9;
            padding: 0.8rem 1.2rem;
            border-radius: 1.5rem;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid #e2f0db;
        }

        .track-item:hover {
            background: #eff9ea;
            transform: translateX(-5px);
            border-color: var(--pistachio-soft);
        }

        .track-item.active {
            background: #d8eace;
            border-right: 5px solid var(--pistachio-deep);
        }

        .track-name i {
            margin-left: 12px;
            color: var(--pistachio-deep);
        }

        .track-duration {
            color: #6c8262;
            font-size: 0.8rem;
        }

        .play-icon {
            background: var(--pistachio-soft);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #2a4b22;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: #e0f0da;
            font-size: 0.8rem;
        }

        @media (max-width: 680px) {
            .hero-section {
                flex-direction: column;
                text-align: center;
                gap: 12px;
            }
            .controls-buttons button {
                width: 45px;
                height: 45px;
                font-size: 1.3rem;
            }
            .track-info h2 {
                font-size: 1.3rem;
            }
        }
        .volume-slider {
            width: 100px;
            background: #bdd6b2;
            height: 4px;
            border-radius: 5px;
            margin-right: 12px;
        }
        .extra-controls {
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
<div class="main-container">
    <!-- هدر با نام mefzal.ir -->
    <div class="hero-section">
        <div class="logo-area">
            <h1>🎵 mefzal.ir</h1>
            <p>نغمه‌های خاص، تجربه‌ای خاص</p>
        </div>
        <div class="domain-badge">
            <i class="fas fa-globe"></i> mefzal.ir | استودیو آنلاین
        </div>
    </div>

    <!-- پلیر زیبا و پیشرفته -->
    <div class="featured-player">
        <div class="cover-area">
            <div class="artwork">
                <i class="fas fa-head-side-headphones"></i>
            </div>
            <div class="track-info">
                <h2 id="currentTrackTitle">شب بارانی</h2>
                <p id="currentTrackArtist">میلاد بیکلام</p>
                <small><i class="fas fa-waveform"></i> پخش آنلاین با کیفیت عالی</small>
            </div>
        </div>

        <div class="player-controls">
            <div class="controls-buttons">
                <button id="prevBtn" title="قبلی"><i class="fas fa-backward-step"></i></button>
                <button id="playPauseBtn" title="پخش/مکث"><i class="fas fa-play"></i></button>
                <button id="nextBtn" title="بعدی"><i class="fas fa-forward-step"></i></button>
            </div>
            <div class="progress-area">
                <span class="time" id="currentTime">0:00</span>
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <span class="time" id="duration">0:00</span>
                <div class="extra-controls">
                    <i class="fas fa-volume-up" style="color:#4b6042;"></i>
                    <input type="range" id="volumeControl" class="volume-slider" min="0" max="1" step="0.01" value="0.7">
                </div>
            </div>
        </div>
    </div>

    <!-- لیست پخش موسیقی -->
    <div class="playlist-section">
        <div class="section-title">
            <i class="fas fa-music"></i> لیست پخش | mefzal.ir
        </div>
        <div class="track-list" id="trackListContainer">
            <!-- داینامیک توسط JS پر می‌شود -->
        </div>
    </div>
    <footer>
        <i class="fas fa-copyright"></i> 2025 mefzal.ir - تمامی حقوق برای شنوندگان واقعی محفوظ است | طراحی با تم پسته‌ای
    </footer>
</div>

<script>
    // ---------- کتابخانه آهنگ های نمونه (برای نمایش زیبا) ----------
    const tracks = [
        {
            title: "شب بارانی",
            artist: "میلاد بیکلام",
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
            duration: "3:45"
        },
        {
            title: "ساحل ارومیه",
            artist: "آوای مهرگان",
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
            duration: "4:12"
        },
        {
            title: "رقص باد",
            artist: "هامون و باران",
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
            duration: "3:28"
        },
        {
            title: "خاطره پسته‌ای",
            artist: "mefzal orchestra",
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
            duration: "5:02"
        },
        {
            title: "نوای کهن",
            artist: "عارف نینوازی",
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3",
            duration: "3:55"
        }
    ];

    // متغیرهای پلیر
    let currentTrackIndex = 0;
    let isPlaying = false;
    const audio = new Audio();
    audio.volume = 0.7;

    // عناصر DOM
    const playPauseBtn = document.getElementById('playPauseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('duration');
    const currentTrackTitleSpan = document.getElementById('currentTrackTitle');
    const currentTrackArtistSpan = document.getElementById('currentTrackArtist');
    const volumeControl = document.getElementById('volumeControl');
    const trackListContainer = document.getElementById('trackListContainer');

    // بارگذاری آهنگ بر اساس ایندکس
    function loadTrack(index) {
        if (index < 0) index = 0;
        if (index >= tracks.length) index = tracks.length - 1;
        currentTrackIndex = index;
        const track = tracks[currentTrackIndex];
        audio.src = track.src;
        currentTrackTitleSpan.innerText = track.title;
        currentTrackArtistSpan.innerText = track.artist;
        // در صورتی که متادیتا دوریشن بارگذاری بشه
        audio.addEventListener('loadedmetadata', () => {
            if (!isNaN(audio.duration)) {
                const mins = Math.floor(audio.duration / 60);
                const secs = Math.floor(audio.duration % 60);
                durationSpan.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            } else {
                durationSpan.innerText = track.duration;
            }
        });
        audio.load();
        if (isPlaying) {
            audio.play().catch(e => console.log("پخش خودکار نیاز به تعامل دارد", e));
        }
        updateActiveTrackInUI();
    }

    // بروزرسانی استایل آیتم فعال در لیست
    function updateActiveTrackInUI() {
        const allItems = document.querySelectorAll('.track-item');
        allItems.forEach((item, idx) => {
            if (idx === currentTrackIndex) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    }

    // پلی/مکث
    function togglePlayPause() {
        if (isPlaying) {
            audio.pause();
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        } else {
            audio.play().catch(err => {
                console.warn("تعامل کاربر نیاز است");
                // در مرورگر ممکنه نیاز به کلیک اولیه باشه، ولی در کل کار می‌کنه
            });
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }
        isPlaying = !isPlaying;
    }

    // آهنگ بعدی
    function nextTrack() {
        if (currentTrackIndex + 1 < tracks.length) {
            currentTrackIndex++;
        } else {
            currentTrackIndex = 0; // لوپ
        }
        loadTrack(currentTrackIndex);
        if (isPlaying) {
            audio.play();
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            // اگر در حالت pause بودیم پس از لود همچنان متوقف بمونه
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            isPlaying = false;
        }
    }

    function prevTrack() {
        if (currentTrackIndex - 1 >= 0) {
            currentTrackIndex--;
        } else {
            currentTrackIndex = tracks.length - 1;
        }
        loadTrack(currentTrackIndex);
        if (isPlaying) {
            audio.play();
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            isPlaying = false;
        }
    }

    // آپدیت نوار پیشرفت
    function updateProgress() {
        if (audio.duration) {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = percent + '%';
            const currentMins = Math.floor(audio.currentTime / 60);
            const currentSecs = Math.floor(audio.currentTime % 60);
            currentTimeSpan.innerText = `${currentMins}:${currentSecs < 10 ? '0' : ''}${currentSecs}`;
        }
    }

    function setProgress(e) {
        const width = progressContainer.clientWidth;
        const clickX = e.offsetX;
        const duration = audio.duration;
        if (duration && !isNaN(duration)) {
            audio.currentTime = (clickX / width) * duration;
        }
    }

    // صدا
    function setVolume() {
        audio.volume = volumeControl.value;
    }

    // وقتی آهنگ تموم شد بره بعدی
    function handleSongEnd() {
        nextTrack();
    }

    // رندر لیست پخش
    function renderPlaylist() {
        trackListContainer.innerHTML = '';
        tracks.forEach((track, idx) => {
            const trackDiv = document.createElement('div');
            trackDiv.className = 'track-item';
            if (idx === currentTrackIndex) trackDiv.classList.add('active');
            trackDiv.innerHTML = `
                <div class="track-name">
                    <i class="fas fa-music"></i> ${track.title} — ${track.artist}
                </div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span class="track-duration"><i class="far fa-clock"></i> ${track.duration}</span>
                    <span class="play-icon"><i class="fas fa-play"></i></span>
                </div>
            `;
            trackDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                // تغییر آهنگ به این ایندکس
                if (currentTrackIndex === idx) {
                    // اگه آهنگ همون بود فقط پلی/مکث
                    togglePlayPause();
                } else {
                    currentTrackIndex = idx;
                    loadTrack(currentTrackIndex);
                    if (isPlaying) {
                        audio.play();
                        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    } else {
                        // شروع خودکار پخش وقتی از لیست انتخاب می‌شه برای تجربه بهتر
                        audio.play().then(() => {
                            isPlaying = true;
                            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        }).catch(() => {
                            isPlaying = false;
                            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
                        });
                    }
                }
                updateActiveTrackInUI();
            });
            trackListContainer.appendChild(trackDiv);
        });
    }

    // رویدادهای زمانی
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('ended', handleSongEnd);
    audio.addEventListener('play', () => {
        isPlaying = true;
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
    });
    audio.addEventListener('pause', () => {
        isPlaying = false;
        playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
    });
    progressContainer.addEventListener('click', setProgress);
    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', nextTrack);
    prevBtn.addEventListener('click', prevTrack);
    volumeControl.addEventListener('input', setVolume);

    // بارگذاری اولیه
    renderPlaylist();
    loadTrack(0);
    audio.volume = 0.7;
    volumeControl.value = 0.7;
    // غیرفعال کردن خودکار پخش تا مرورگر اجازه بده، اما می‌توان پس از تعامل کاربر پخش کرد
    isPlaying = false;
    playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
    // در صورت نیاز قابلیت preload
    audio.preload = 'metadata';
    
    // نمایش جذابیت بیشتر: وقتی صفحه لود شد یک افکت خوش آمد گویی سبک
    console.log("mefzal.ir | سایت موسیقی با تم پسته‌ای آماده پخش است!");
</script>
</body>
</html>
